<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>医学影像标注平台</title>
    <link rel="stylesheet" href="/frontend/styles.css?v=incremental-train-20260715" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 80 80" role="img">
              <circle class="neu-core" cx="40" cy="40" r="30" />
              <circle class="neu-ring-inner" cx="40" cy="40" r="33" />
              <circle class="neu-ring-tech" cx="40" cy="40" r="36" />
              <path class="neu-mountain" d="M18 50 L28 32 L35 42 L43 24 L51 40 L58 30 L62 50 Z" />
              <path class="neu-mountain-edge" d="M18 50 L28 32 L35 42 L43 24 L51 40 L58 30 L62 50" />
              <path class="neu-water" d="M17 54 Q28 49 39 54 T61 54" />
              <path class="neu-water neu-water-b" d="M19 59 Q31 55 41 59 T63 59" />
              <text class="neu-letters" x="40" y="44">NEU</text>
              <circle class="neu-node" cx="40" cy="16" r="1.8" />
            </svg>
          </div>
          <div>
            <div class="brand-title">Medical Annotation</div>
            <div class="brand-subtitle">NEU · C组医学标注平台</div>
          </div>
        </div>

        <nav class="nav-list" aria-label="主导航">
          <button class="nav-item active" data-view="dashboard"><span>⌁</span>数据总览</button>
          <button class="nav-item" data-view="cases"><span>▤</span>病例中心</button>
          <button class="nav-item" data-view="annotation"><span>◱</span>标注工作台</button>
          <button class="nav-item" data-view="train"><span>↗</span>智能训练中心</button>
          <button class="nav-item" data-view="versions"><span>◎</span>版本审核</button>
          <button class="nav-item" data-view="quality"><span>◇</span>质量报告</button>
          <button class="nav-item" data-view="export"><span>⇩</span>Dataset导出</button>
          <button class="nav-item" data-view="settings"><span>⚙</span>系统设置</button>
        </nav>

        <div class="sidebar-footer">
          <span class="status-dot"></span>
          <span id="apiStatus">后端检测中</span>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div>
            <div class="eyebrow">医学智能工作站</div>
            <h1 id="pageTitle">数据总览</h1>
          </div>
          <div class="topbar-actions">
            <div class="date-pill" id="userPill">未登录</div>
            <div class="date-pill" id="currentDate"></div>
            <button class="ghost-button" id="loginButton">登录</button>
            <button class="ghost-button hidden" id="logoutButton">退出</button>
            <button class="ghost-button" id="refreshButton">刷新</button>
          </div>
        </header>

        <section id="viewRoot" class="view-root" aria-live="polite"></section>
      </main>
    </div>

    <div id="loginOverlay" class="login-overlay login-gate">
      <div class="login-gate-bg" aria-hidden="true">
        <span class="login-grid"></span>
        <span class="login-orb login-orb-a"></span>
        <span class="login-orb login-orb-b"></span>
        <span class="login-scanline"></span>
      </div>
      <div class="login-gate-shell">
        <section class="login-hero">
          <div class="login-hero-mark brand-mark" aria-hidden="true">
            <svg viewBox="0 0 80 80" role="img">
              <circle class="neu-core" cx="40" cy="40" r="30" />
              <circle class="neu-ring-inner" cx="40" cy="40" r="33" />
              <circle class="neu-ring-tech" cx="40" cy="40" r="36" />
              <path class="neu-mountain" d="M18 50 L28 32 L35 42 L43 24 L51 40 L58 30 L62 50 Z" />
              <path class="neu-mountain-edge" d="M18 50 L28 32 L35 42 L43 24 L51 40 L58 30 L62 50" />
              <path class="neu-water" d="M17 54 Q28 49 39 54 T61 54" />
              <path class="neu-water neu-water-b" d="M19 59 Q31 55 41 59 T63 59" />
              <text class="neu-letters" x="40" y="44">NEU</text>
              <circle class="neu-node" cx="40" cy="16" r="1.8" />
            </svg>
          </div>
          <p class="login-kicker">Northeastern University · Medical AI</p>
          <h1>医学影像标注平台</h1>
          <p class="login-hero-copy">人机协同闭环：导入 · 标注 · 智能预测 · 审核 · 训练 · 导出。请选择身份接入系统。</p>
          <ul class="login-feature-list">
            <li><span>01</span>多平面标注与 3D 体视</li>
            <li><span>02</span>多器官智能推理与修正</li>
            <li><span>03</span>版本审核与 Dataset 导出</li>
          </ul>
          <div class="login-hero-foot">自强不息 · 知行合一</div>
        </section>

        <section class="login-panel">
          <div class="login-panel-head">
            <h2>身份接入</h2>
            <p>选择角色后自动填充演示账号，也可手动修改。</p>
          </div>
          <div class="role-cards" role="radiogroup" aria-label="选择登录身份">
            <button type="button" class="role-card active" data-role-preset="annotator" aria-pressed="true">
              <strong>标注员</strong>
              <span>Annotator</span>
              <small>2D/3D 标注 · 智能预测 · 提交审核</small>
            </button>
            <button type="button" class="role-card" data-role-preset="reviewer" aria-pressed="false">
              <strong>审核员</strong>
              <span>Reviewer</span>
              <small>审核队列 · 通过 / 驳回 · 质量对比</small>
            </button>
            <button type="button" class="role-card" data-role-preset="admin" aria-pressed="false">
              <strong>管理员</strong>
              <span>Admin</span>
              <small>用户与任务 · 标签设置 · 全权限</small>
            </button>
          </div>
          <form id="loginForm" class="login-form">
            <label>用户名<input id="loginUsername" name="username" value="annotator" autocomplete="username" required /></label>
            <label>密码<input id="loginPassword" name="password" type="password" value="annotator123" autocomplete="current-password" required /></label>
            <p class="login-hint" data-login-hint>演示口令：annotator123</p>
            <div class="login-actions">
              <button class="primary-button login-submit" type="submit">进入系统</button>
              <button class="ghost-button" type="button" id="loginDismiss">稍后浏览</button>
            </div>
          </form>
        </section>
      </div>
    </div>

    <div id="toast" class="toast" role="status"></div>

    <script src="/frontend/app.js?v=incremental-train-20260715"></script>
  </body>
</html>
